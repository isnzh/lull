<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lull — 味道雨滴demo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080810;color:#e8e4dc;font-family:'Crimson Pro',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.wrap{width:100%;max-width:420px;display:flex;flex-direction:column;gap:1.2rem;align-items:center;}
h1{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;font-weight:300;color:rgba(200,190,255,0.5);text-align:center;letter-spacing:0.1em;}
.divider{width:36px;height:1px;background:linear-gradient(90deg,transparent,#3a3650,transparent);}
#gameCanvas{border-radius:12px;border:0.5px solid rgba(140,120,200,0.2);display:block;cursor:none;touch-action:none;}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
button{background:transparent;border:0.5px solid rgba(140,120,200,0.3);border-radius:999px;padding:8px 22px;font-family:'Crimson Pro',serif;font-size:13px;color:rgba(140,120,200,0.6);cursor:pointer;transition:all 0.2s;}
button:hover:not(:disabled){border-color:rgba(140,120,200,0.6);color:rgba(180,160,255,0.9);}
button:disabled{opacity:0.2;cursor:not-allowed;}
button.primary{border-color:rgba(180,160,255,0.5);color:rgba(200,190,255,0.8);}
button.drink{border-color:rgba(180,160,255,0.6);color:rgba(220,210,255,0.9);font-size:15px;padding:10px 28px;font-family:'Cormorant Garamond',serif;font-style:italic;}
.hint{font-size:11px;font-style:italic;font-family:'Cormorant Garamond',serif;color:rgba(140,120,200,0.3);text-align:center;}

/* 喝一口页面 */
#drinkPage{display:none;width:100%;flex-direction:column;align-items:center;gap:1.2rem;animation:fadeIn 0.8s ease forwards;}

/* 结果页面 */
#resultPage{display:none;width:100%;flex-direction:column;align-items:center;gap:1.2rem;animation:fadeIn 0.8s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.liquid-cup{font-size:72px;line-height:1;text-align:center;animation:floatCup 3s ease-in-out infinite;}
@keyframes floatCup{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.result-got{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:rgba(140,120,200,0.5);letter-spacing:0.15em;text-transform:uppercase;}
.result-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:rgba(220,215,255,0.9);text-align:center;line-height:1.4;}
.result-desc{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:rgba(200,190,255,0.6);text-align:center;line-height:1.9;max-width:300px;}
.flavor-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.flavor-tag{border-radius:999px;padding:4px 12px;font-size:12px;font-family:'Crimson Pro',serif;}
.color-dot{width:56px;height:56px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.1);margin:0 auto;}
</style>
</head>
<body>
<div class="wrap">
  <h1>"味道的雨"</h1>
  <div class="divider"></div>

  <canvas id="gameCanvas" width="500" height="500"></canvas>

  <div class="controls">
    <button class="primary" id="startBtn" onclick="startGame()">▶ 开始下雨</button>
  </div>
  <div class="hint" id="gameHint">按开始，用鼠标或手指左右移动来接雨滴</div>

  <!-- 喝一口页面 -->
  <div id="drinkPage">
    <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:rgba(200,190,255,0.5);text-align:center;">雨停了。</div>
    <div class="color-dot" id="drinkColorDot"></div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:rgba(140,120,200,0.4);text-align:center;" id="drinkHint"></div>
    <button class="drink" onclick="showResult()">喝一口尝尝</button>
  </div>

  <!-- 结果页 -->
  <div id="resultPage">
    <div class="result-got">你尝到了</div>
    <div class="liquid-cup" id="liquidCup">🫗</div>
    <div class="color-dot" id="resultColorDot"></div>
    <div class="result-name" id="resultName"></div>
    <div class="flavor-tags" id="flavorTags"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button onclick="resetGame()">重新接雨</button>
  </div>
</div>

<script>
// ── Audio files (Safari compatible) ──
const AUDIO = {};
['sour','sweet','bitter','spicy','salty'].forEach(id=>{
  const a = new Audio(`sounds/${id}.mp3`);
  a.volume = 0.6;
  a.load();
  AUDIO[id] = a;
});

function playNote(id){
  try{
    const a = AUDIO[id];
    if(!a) return;
    // clone to allow overlapping plays
    const clone = a.cloneNode();
    clone.volume = 0.6;
    clone.play().catch(()=>{});
    setTimeout(()=>clone.remove(), 2000);
  }catch(e){}
}

function unlockAudio(){
  // pre-warm audio on first interaction
  Object.values(AUDIO).forEach(a=>{ a.play().then(()=>a.pause()).catch(()=>{}); });
}
document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('mousedown', unlockAudio, {once:true});

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const FLAVORS = [
  { id:'sour',   name:'酸', color:{r:220,g:220,b:60} },
  { id:'sweet',  name:'甜', color:{r:240,g:140,b:180} },
  { id:'bitter', name:'苦', color:{r:60, g:100,b:80} },
  { id:'spicy',  name:'辣', color:{r:220,g:60, b:60} },
  { id:'salty',  name:'咸', color:{r:100,g:160,b:220} },
];

const SINGLE = {
  sour:   { name:'酸得让牙齿发软，像咬开了一颗青梅',   cup:'🍋' },
  sweet:  { name:'甜甜的，像花朵上还没蒸发的露珠',     cup:'🌸' },
  bitter: { name:'苦得发涩，像嚼碎了一片老茶叶',       cup:'🍃' },
  spicy:  { name:'辣得发烫，像误吞了一粒野生的山椒',   cup:'🌶' },
  salty:  { name:'咸咸的，像海浪退走之后沙子上结的盐', cup:'🌊' },
};

const DOUBLE = {
  'sour+sweet':   { name:'先酸后甜，像还没全熟的草莓',                cup:'🍓' },
  'sour+bitter':  { name:'又酸又苦，像咬了一口没泡开的柠檬皮',        cup:'🍵' },
  'sour+spicy':   { name:'酸里带辣，像腌了很久的泡菜坛子打开的瞬间',  cup:'🫙' },
  'sour+salty':   { name:'酸咸交织，像腌梅子沁出来的汁',              cup:'🫧' },
  'sweet+bitter': { name:'甜里藏着苦，像可可豆刚磨碎还没加糖',        cup:'🍫' },
  'sweet+spicy':  { name:'甜的同时有点辣，像蜂蜜里泡着的一截姜',      cup:'🍯' },
  'sweet+salty':  { name:'甜里带咸，像撒了一点盐的焦糖',              cup:'🧂' },
  'bitter+spicy': { name:'苦而且辣，像嚼了一口生姜和苦瓜一起',        cup:'🌿' },
  'bitter+salty': { name:'又苦又咸，像海边老树皮上舔下来的',          cup:'🪨' },
  'spicy+salty':  { name:'辣而且咸，像腌辣椒坛子里的盐水',           cup:'🫗' },
};

function getDoubleKey(ids){
  const order=['sour','sweet','bitter','spicy','salty'];
  return ids.slice().sort((a,b)=>order.indexOf(a)-order.indexOf(b)).join('+');
}

function buildResult(){
  const total=Object.values(caught).reduce((a,b)=>a+b,0);
  let cr=128,cg=128,cb=128;
  if(mixColor.count>0){
    cr=Math.min(255,Math.round(mixColor.r/mixColor.count));
    cg=Math.min(255,Math.round(mixColor.g/mixColor.count));
    cb=Math.min(255,Math.round(mixColor.b/mixColor.count));
  }
  if(total===0) return{name:'什么味道都没有，像舔了一下清晨的空气',cup:'🫙',tags:[],color:{r:cr,g:cg,b:cb}};
  const sorted=Object.entries(caught).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const ids=sorted.map(([id])=>id);
  let name,cup;
  if(ids.length===1){
    name=SINGLE[ids[0]].name; cup=SINGLE[ids[0]].cup;
  } else if(ids.length===2){
    const d=DOUBLE[getDoubleKey(ids)]||{name:'两种味道混在一起，说不清楚',cup:'🫗'};
    name=d.name; cup=d.cup;
  } else {
    const names=sorted.map(([id])=>FLAVORS.find(f=>f.id===id).name);
    name=names.join('的、')+'的，像把梦里某个说不清楚的东西放进嘴里';
    cup='🫗';
  }
  return{name,cup,tags:sorted.map(([id,count])=>({flavor:FLAVORS.find(f=>f.id===id),count})),color:{r:cr,g:cg,b:cb}};
}

let drops=[],player={x:W/2,w:46,h:10};
let caught={sour:0,sweet:0,bitter:0,spicy:0,salty:0};
let mixColor={r:0,g:0,b:0,count:0};
let gameActive=false,totalDrops=0,maxDrops=100;
let rainInterval=null,animRaf=null;
let keys={left:false,right:false};
let savedResult=null;

function spawnDrop(){
  if(totalDrops>=maxDrops)return;
  totalDrops++;
  const f=FLAVORS[Math.floor(Math.random()*FLAVORS.length)];
  drops.push({x:20+Math.random()*(W-40),y:-14,vy:500+Math.random()*1000,r:7+Math.random()*3,flavor:f,trail:[],done:false});
}

function drawFrame(){
  ctx.fillStyle='#080810'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(140,120,200,0.06)';
  ctx.beginPath(); ctx.roundRect(W/2-70,6,140,30,15); ctx.fill();
  ctx.fillStyle='rgba(200,190,255,0.22)';
  ctx.font='13px serif'; ctx.textAlign='center';
  ctx.fillText('☁️  ☁️  ☁️',W/2,26);
  FLAVORS.forEach((f,i)=>{
    const x=12+i*72,y=H-48;
    ctx.beginPath(); ctx.arc(x+6,y,5,0,Math.PI*2);
    ctx.fillStyle=`rgba(${f.color.r},${f.color.g},${f.color.b},0.7)`; ctx.fill();
    ctx.fillStyle='rgba(200,190,255,0.4)';
    ctx.font='10px Crimson Pro'; ctx.textAlign='left';
    ctx.fillText(f.name,x+14,y+4);
  });
  drops.forEach(d=>{
    if(d.done)return;
    d.trail.forEach((t,i)=>{
      ctx.beginPath(); ctx.arc(t.x,t.y,d.r*0.45,0,Math.PI*2);
      ctx.fillStyle=`rgba(${d.flavor.color.r},${d.flavor.color.g},${d.flavor.color.b},${(i/d.trail.length)*0.25})`; ctx.fill();
    });
    const g=ctx.createRadialGradient(d.x-d.r*0.3,d.y-d.r*0.3,0,d.x,d.y,d.r);
    const c=d.flavor.color;
    g.addColorStop(0,`rgba(${Math.min(255,c.r+70)},${Math.min(255,c.g+70)},${Math.min(255,c.b+70)},0.95)`);
    g.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0.8)`);
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},0.7)`;
    ctx.font='9px Crimson Pro'; ctx.textAlign='center';
    ctx.fillText(d.flavor.name,d.x,d.y-d.r-2);
  });
  const px=player.x-player.w/2,py=H-28;
  const g2=ctx.createLinearGradient(px,py,px+player.w,py);
  if(mixColor.count>0){
    const cr=Math.min(255,Math.round(mixColor.r/mixColor.count));
    const cg=Math.min(255,Math.round(mixColor.g/mixColor.count));
    const cb=Math.min(255,Math.round(mixColor.b/mixColor.count));
    g2.addColorStop(0,`rgba(${cr},${cg},${cb},0.75)`);
    g2.addColorStop(1,`rgba(${cr},${cg},${cb},0.4)`);
  } else {
    g2.addColorStop(0,'rgba(200,190,255,0.5)');
    g2.addColorStop(1,'rgba(140,120,200,0.3)');
  }
  ctx.beginPath(); ctx.roundRect(px,py,player.w,player.h,5);
  ctx.fillStyle=g2; ctx.fill();
  ctx.fillStyle='rgba(200,190,255,0.3)';
  ctx.font='11px Crimson Pro'; ctx.textAlign='left';
  ctx.fillText(`接到 ${Object.values(caught).reduce((a,b)=>a+b,0)} 滴`,10,H-8);
  ctx.textAlign='right';
  ctx.fillText(totalDrops<maxDrops?`还有约 ${maxDrops-totalDrops} 滴`:'雨停了…',W-10,H-8);
  if(mixColor.count>0){
    const cr=Math.min(255,Math.round(mixColor.r/mixColor.count));
    const cg=Math.min(255,Math.round(mixColor.g/mixColor.count));
    const cb=Math.min(255,Math.round(mixColor.b/mixColor.count));
    ctx.beginPath(); ctx.arc(W/2,H-22,7,0,Math.PI*2);
    ctx.fillStyle=`rgb(${cr},${cg},${cb})`; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
  }
}

function update(delta){
  if(!gameActive)return;
  const spd=300*delta;
  if(keys.left)  player.x=Math.max(player.w/2,player.x-spd);
  if(keys.right) player.x=Math.min(W-player.w/2,player.x+spd);
  const py=H-28;
  drops.forEach(d=>{
    if(d.done)return;
    d.trail.push({x:d.x,y:d.y});
    if(d.trail.length>8)d.trail.shift();
    d.y+=d.vy*delta;
    if(d.y+d.r>=py&&d.y-d.r<=py+10&&d.x>=player.x-player.w/2-d.r&&d.x<=player.x+player.w/2+d.r){
      d.done=true;
      caught[d.flavor.id]++;
      mixColor.r+=d.flavor.color.r; mixColor.g+=d.flavor.color.g; mixColor.b+=d.flavor.color.b; mixColor.count++;
      playNote(d.flavor.id);
      spawnEffect(d.x,py,d.flavor.color);
    }
    if(d.y>H+20)d.done=true;
  });
  drops=drops.filter(d=>!d.done);
  if(totalDrops>=maxDrops&&drops.length===0)endGame();
}

function spawnEffect(x,y,c){
  for(let i=0;i<5;i++){
    const el=document.createElement('div');
    const a=Math.random()*Math.PI*2,dist=12+Math.random()*18;
    const rect=canvas.getBoundingClientRect();
    el.style.cssText=`position:fixed;pointer-events:none;z-index:999;width:5px;height:5px;border-radius:50%;background:rgba(${c.r},${c.g},${c.b},0.85);left:${rect.left+x}px;top:${rect.top+y}px;transition:all 0.5s ease-out;transform:translate(-50%,-50%);`;
    document.body.appendChild(el);
    requestAnimationFrame(()=>{el.style.transform=`translate(calc(-50% + ${Math.cos(a)*dist}px),calc(-50% + ${Math.sin(a)*dist}px)) scale(0)`;el.style.opacity='0';});
    setTimeout(()=>el.remove(),550);
  }
}

function endGame(){
  gameActive=false;
  clearInterval(rainInterval); cancelAnimationFrame(animRaf);
  drawFrame();
  savedResult=buildResult();
  setTimeout(()=>{
    document.getElementById('gameCanvas').style.display='none';
    document.getElementById('startBtn').style.display='none';
    document.getElementById('gameHint').style.display='none';
    const dp=document.getElementById('drinkPage');
    dp.style.display='flex';
    const{r,g,b}=savedResult.color;
    document.getElementById('drinkColorDot').style.background=`rgb(${r},${g},${b})`;
    const total=Object.values(caught).reduce((a,v)=>a+v,0);
    document.getElementById('drinkHint').textContent=total>0?`接到了 ${total} 滴，混合成了这个颜色。`:'什么都没接到。杯子是空的。';
  },600);
}

function showResult(){
  document.getElementById('drinkPage').style.display='none';
  const rp=document.getElementById('resultPage');
  rp.style.display='flex';
  const{name,cup,tags,color}=savedResult;
  const{r,g,b}=color;
  document.getElementById('liquidCup').textContent=cup;
  document.getElementById('resultColorDot').style.background=`rgb(${r},${g},${b})`;
  document.getElementById('resultName').textContent=name;
  const tagsEl=document.getElementById('flavorTags'); tagsEl.innerHTML='';
  tags.forEach(({flavor,count})=>{
    const tag=document.createElement('span'); tag.className='flavor-tag';
    tag.style.cssText=`background:rgba(${flavor.color.r},${flavor.color.g},${flavor.color.b},0.12);border:0.5px solid rgba(${flavor.color.r},${flavor.color.g},${flavor.color.b},0.4);color:rgba(${Math.min(255,flavor.color.r+60)},${Math.min(255,flavor.color.g+60)},${Math.min(255,flavor.color.b+60)},0.9);`;
    tag.textContent=`${flavor.name} × ${count}`; tagsEl.appendChild(tag);
  });
  document.getElementById('resultDesc').textContent='';
}

function startGame(){
  unlockAudio();
  gameActive=true;
  drops=[]; caught={sour:0,sweet:0,bitter:0,spicy:0,salty:0};
  mixColor={r:0,g:0,b:0,count:0}; totalDrops=0; player.x=W/2; savedResult=null;
  document.getElementById('startBtn').disabled=true;
  document.getElementById('gameHint').textContent='用鼠标或 ← → 键左右移动接雨滴';
  rainInterval=setInterval(()=>{
    if(totalDrops<maxDrops) spawnDrop();
    else clearInterval(rainInterval);
  },300);
  let lastTs=0;
  function loop(ts){
    const delta=lastTs?Math.min((ts-lastTs)/1000, 0.05):0.016;
    lastTs=ts;
    update(delta); drawFrame();
    if(gameActive) animRaf=requestAnimationFrame(loop);
  }
  animRaf=requestAnimationFrame(loop);
}

function resetGame(){
  clearInterval(rainInterval); cancelAnimationFrame(animRaf);
  gameActive=false; drops=[]; caught={sour:0,sweet:0,bitter:0,spicy:0,salty:0};
  mixColor={r:0,g:0,b:0,count:0}; totalDrops=0; player.x=W/2; savedResult=null;
  document.getElementById('resultPage').style.display='none';
  document.getElementById('drinkPage').style.display='none';
  document.getElementById('gameCanvas').style.display='block';
  document.getElementById('startBtn').style.display='inline-block';
  document.getElementById('startBtn').disabled=false;
  document.getElementById('gameHint').style.display='block';
  document.getElementById('gameHint').textContent='按开始，用鼠标或手指左右移动来接雨滴';
  ctx.fillStyle='#080810'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(200,190,255,0.15)';
  ctx.font='italic 14px Cormorant Garamond'; ctx.textAlign='center';
  ctx.fillText('按开始，等待有味道的雨……',W/2,H/2);
}

document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')keys.left=true;if(e.key==='ArrowRight')keys.right=true;});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')keys.left=false;if(e.key==='ArrowRight')keys.right=false;});
canvas.addEventListener('mousemove',e=>{if(!gameActive)return;const r=canvas.getBoundingClientRect();player.x=Math.max(player.w/2,Math.min(W-player.w/2,(e.clientX-r.left)*(W/r.width)));});
canvas.addEventListener('touchmove',e=>{if(!gameActive)return;e.preventDefault();const r=canvas.getBoundingClientRect();player.x=Math.max(player.w/2,Math.min(W-player.w/2,(e.touches[0].clientX-r.left)*(W/r.width)));},{passive:false});

ctx.fillStyle='#080810'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(200,190,255,0.15)'; ctx.font='italic 14px Cormorant Garamond'; ctx.textAlign='center';
ctx.fillText('按开始，等待有味道的雨……',W/2,H/2);
</script>
</body>
</html>
