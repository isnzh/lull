<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lull — Chapter I</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e10;
      color: #e8e4dc;
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #lull-root {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 480px;
    }

    .screen { display: none; width: 100%; text-align: center; flex-direction: column; align-items: center; gap: 1.6rem; }
    .screen.active { display: flex; animation: fadeIn 0.5s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .chapter-tag {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: #6b6860;
      text-transform: uppercase;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: #2e2d2a;
    }

    .question-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      line-height: 1.45;
      color: #e8e4dc;
      max-width: 360px;
    }

    .sub-text {
      font-size: 15px;
      color: #6b6860;
      font-weight: 300;
      line-height: 1.7;
      max-width: 320px;
    }

    .options-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 400px;
    }

    .opt-btn {
      background: transparent;
      border: 1px solid #2e2d2a;
      border-radius: 999px;
      padding: 8px 22px;
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      font-weight: 300;
      color: #a09c94;
      cursor: pointer;
      transition: all 0.2s;
    }

    .opt-btn:hover { border-color: #4a4840; color: #e8e4dc; }
    .opt-btn.selected { border-color: #7a7060; color: #e8e4dc; background: #1a1917; }

    .text-input-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }

    .ghost-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #2e2d2a;
      border-radius: 0;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      font-style: italic;
      color: #e8e4dc;
      padding: 6px 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    .ghost-input:focus { border-bottom-color: #7a7060; }
    .ghost-input::placeholder { color: #3a3835; }

    .next-btn {
      background: transparent;
      border: 1px solid #2e2d2a;
      border-radius: 6px;
      padding: 9px 30px;
      font-family: 'Crimson Pro', serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #6b6860;
      cursor: pointer;
      transition: all 0.2s;
    }

    .next-btn:hover:not(:disabled) { border-color: #7a7060; color: #e8e4dc; }
    .next-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .progress-dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #2e2d2a;
      transition: background 0.3s;
    }

    .dot.active { background: #7a7060; }
    .dot.done   { background: #4a4840; }

    .map-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      border: 1px solid #2e2d2a;
      border-radius: 10px;
      background: #131210;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .map-placeholder svg { opacity: 0.25; }

    .map-placeholder-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      font-weight: 300;
      color: #3a3835;
    }
  </style>
</head>
<body>
<div id="lull-root">

  <!-- Q1 -->
  <div id="s0" class="screen active">
    <span class="chapter-tag">Chapter I &nbsp;·&nbsp; 重逢之地</span>
    <div class="divider"></div>
    <p class="question-text">"你还认得我吗？"</p>
    <p class="sub-text">梦境边缘，有什么东西在等你。</p>
    <div class="options-grid">
      <button class="opt-btn" onclick="pick(0,this)">认得</button>
      <button class="opt-btn" onclick="pick(0,this)">有点模糊了</button>
      <button class="opt-btn" onclick="pick(0,this)">我一直都记得你</button>
    </div>
    <button class="next-btn" id="n0" disabled onclick="next(1)">继续 →</button>
    <div class="progress-dots">
      <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <!-- Q2 -->
  <div id="s1" class="screen">
    <span class="chapter-tag">Chapter I &nbsp;·&nbsp; 重逢之地</span>
    <div class="divider"></div>
    <p class="question-text">"我们是——"</p>
    <div class="options-grid">
      <button class="opt-btn" onclick="pick(1,this)">家人</button>
      <button class="opt-btn" onclick="pick(1,this)">朋友</button>
      <button class="opt-btn" onclick="pick(1,this)">恋人</button>
      <button class="opt-btn" onclick="pick(1,this)">我的孩子</button>
      <button class="opt-btn" onclick="pick(1,this)">我养过的动物</button>
      <button class="opt-btn" onclick="pick(1,this)">说不清楚</button>
    </div>
    <button class="next-btn" id="n1" disabled onclick="next(2)">继续 →</button>
    <div class="progress-dots">
      <div class="dot done"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <!-- Q3 -->
  <div id="s2" class="screen">
    <span class="chapter-tag">Chapter I &nbsp;·&nbsp; 重逢之地</span>
    <div class="divider"></div>
    <p class="question-text">"你还记得我的名字吗？"</p>
    <div class="text-input-wrap">
      <input class="ghost-input" id="nameInput" type="text" placeholder="在这里写下来…" oninput="checkName()" />
    </div>
    <div class="options-grid" style="margin-top:4px">
      <button class="opt-btn" onclick="skipName(this)">记得，但说不出口</button>
      <button class="opt-btn" onclick="skipName(this)">我忘了</button>
    </div>
    <button class="next-btn" id="n2" disabled onclick="next(3)">继续 →</button>
    <div class="progress-dots">
      <div class="dot done"></div><div class="dot done"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <!-- Q4 -->
  <div id="s3" class="screen">
    <span class="chapter-tag">Chapter I &nbsp;·&nbsp; 重逢之地</span>
    <div class="divider"></div>
    <p class="question-text">"你离开多久了？"</p>
    <div class="options-grid">
      <button class="opt-btn" onclick="pick(3,this)">不久以前</button>
      <button class="opt-btn" onclick="pick(3,this)">几年了</button>
      <button class="opt-btn" onclick="pick(3,this)">很久很久以前</button>
      <button class="opt-btn" onclick="pick(3,this)">我不知道</button>
    </div>
    <button class="next-btn" id="n3" disabled onclick="next(4)">继续 →</button>
    <div class="progress-dots">
      <div class="dot done"></div><div class="dot done"></div><div class="dot done"></div><div class="dot active"></div><div class="dot"></div>
    </div>
  </div>

  <!-- Q5 -->
  <div id="s4" class="screen">
    <span class="chapter-tag">Chapter I &nbsp;·&nbsp; 重逢之地</span>
    <div class="divider"></div>
    <p class="question-text">"你有没有想过我？"</p>
    <div class="options-grid">
      <button class="opt-btn" onclick="pick(4,this)">一直都在想</button>
      <button class="opt-btn" onclick="pick(4,this)">有时候</button>
      <button class="opt-btn" onclick="pick(4,this)">我试着不去想</button>
    </div>
    <button class="next-btn" id="n4" disabled onclick="next(5)">进入地图 →</button>
    <div class="progress-dots">
      <div class="dot done"></div><div class="dot done"></div><div class="dot done"></div><div class="dot done"></div><div class="dot active"></div>
    </div>
  </div>

  <!-- 地图 -->
  <div id="s5" class="screen">
    <span class="chapter-tag">Chapter I &nbsp;·&nbsp; 重逢之地</span>
    <div class="divider"></div>
    <div class="map-placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e8e4dc" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
        <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
      </svg>
      <span class="map-placeholder-label">在这里放入你画的地图</span>
    </div>
    <p class="sub-text" style="font-style:italic">点击地图上的地点开始探索</p>
  </div>

</div>
<script>
  const picks = {};

  function pick(q, btn) {
    btn.closest('.options-grid').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    picks[q] = btn.textContent;
    const nb = document.getElementById('n' + q);
    if (nb) nb.disabled = false;
  }

  function checkName() {
    const v = document.getElementById('nameInput').value.trim();
    const nb = document.getElementById('n2');
    if (v.length > 0) { picks[2] = v; nb.disabled = false; }
    else if (!picks['2skip']) nb.disabled = true;
  }

  function skipName(btn) {
    btn.closest('.options-grid').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    picks[2] = btn.textContent;
    picks['2skip'] = true;
    document.getElementById('n2').disabled = false;
  }

  function next(to) {
    document.querySelector('.screen.active').classList.remove('active');
    const ns = document.getElementById('s' + to);
    ns.classList.add('active');
  }
</script>
</body>
</html>
